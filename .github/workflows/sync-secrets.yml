# Manual, gated sync of OAuth secrets from GitHub Actions secrets into
# Supabase Edge Function secrets — so credential handoff is repeatable without
# anyone pasting values into a dashboard. Companion to deploy.yml (same gate
# pattern: trigger from the Actions tab, type "sync" to confirm).
#
# Only the names listed below are synced, and only when the GitHub secret is
# non-empty — so the Microsoft entries are no-ops until those secrets exist.
# Values never appear in logs (passed via env, set with a quoted argument).
name: Sync edge secrets (manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "sync" to push OAuth secrets to the LIVE Supabase project'
        required: true

jobs:
  sync:
    if: ${{ github.event.inputs.confirm == 'sync' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      DO_NOT_TRACK: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref phabxcijbbphfxvjedfj

      - name: Set edge function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          MS_OAUTH_CLIENT_ID: ${{ secrets.MS_OAUTH_CLIENT_ID }}
          MS_OAUTH_CLIENT_SECRET: ${{ secrets.MS_OAUTH_CLIENT_SECRET }}
          MS_OAUTH_TENANT: ${{ secrets.MS_OAUTH_TENANT }}
        run: |
          args=()
          for name in GOOGLE_OAUTH_CLIENT_ID GOOGLE_OAUTH_CLIENT_SECRET \
                      MS_OAUTH_CLIENT_ID MS_OAUTH_CLIENT_SECRET MS_OAUTH_TENANT; do
            if [ -n "${!name}" ]; then
              args+=("$name=${!name}")
              echo "will set: $name"
            else
              echo "skipping (empty): $name"
            fi
          done
          if [ ${#args[@]} -eq 0 ]; then
            echo "Nothing to sync."; exit 0
          fi
          supabase secrets set "${args[@]}"
