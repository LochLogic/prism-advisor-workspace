# Manual, gated deploy of the Supabase half (migrations + edge functions) so the
# repo is the source of truth instead of hand-run CLI commands (2026-06 review).
# NOT automatic: trigger from the Actions tab, type "deploy" to confirm. The
# `production` environment can require a reviewer (repo Settings → Environments)
# for a second human gate.
#
# Requires these repo secrets (TODO.md H3):
#   SUPABASE_ACCESS_TOKEN  — a Supabase personal access token
#   SUPABASE_DB_PASSWORD   — the project DB password (for `db push`)
# The project is linked explicitly (supabase link --project-ref …) in the first
# step; the CLI does not infer the ref from config.toml's project_id.
name: Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to push migrations + functions to LIVE'
        required: true

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: latest

      # `db push` / `functions deploy` need the project explicitly linked — the
      # CLI does NOT infer the ref from config.toml's project_id. Link once here.
      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref phabxcijbbphfxvjedfj

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push

      # Deploy every function; verify_jwt comes from supabase/config.toml so we
      # never have to remember per-function flags.
      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in create-checkout-session error-digest generate-invoices health \
                    log-error plaid-create-link-token plaid-exchange-token \
                    stripe-webhook worm-export; do
            echo "::group::deploy $fn"
            supabase functions deploy "$fn"
            echo "::endgroup::"
          done
