# Manual, gated deploy of the Supabase EDGE FUNCTIONS so the repo is the source
# of truth for what's live instead of hand-run CLI commands (2026-06 review).
# NOT automatic: trigger from the Actions tab, type "deploy" to confirm. The
# `production` environment can require a reviewer (repo Settings → Environments)
# for a second human gate.
#
# Migrations are NOT pushed here. They're applied by hand in the Supabase SQL
# editor (the operating model for this project), so the migration ledger
# (supabase_migrations.schema_migrations) is intentionally unmanaged and a
# `db push` would try to replay 001+ and fail on already-existing objects. New
# migration files are applied manually; see TODO.md H4.
#
# Requires these repo secrets (TODO.md H3):
#   SUPABASE_ACCESS_TOKEN  — a Supabase personal access token
#   SUPABASE_DB_PASSWORD   — the project DB password (keeps `link` non-interactive)
# The project is linked explicitly (supabase link --project-ref …); the CLI does
# not infer the ref from config.toml's project_id.
name: Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to deploy edge functions to LIVE'
        required: true

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    environment: production
    # Disable the CLI's PostHog telemetry: in CI it can't reach PostHog and the
    # shutdown flush times out, returning exit 1 even after the command itself
    # succeeded (e.g. "Finished supabase link." then a non-zero exit).
    env:
      DO_NOT_TRACK: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v2
        with:
          version: latest

      # `functions deploy` needs the project explicitly linked — the CLI does
      # NOT infer the ref from config.toml's project_id.
      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          # Passed so `link` never prompts for the DB password in CI.
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref phabxcijbbphfxvjedfj

      # Deploy every function; verify_jwt comes from supabase/config.toml so we
      # never have to remember per-function flags.
      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in ai-assist api-keys calendar-events calendar-oauth client-identifiers create-checkout-session docusign-connect docusign-envelope \
                    error-digest generate-invoices health \
                    log-error plaid-create-link-token plaid-exchange-token platform-admin public-api \
                    send-push stripe-webhook webhooks worm-export; do
            echo "::group::deploy $fn"
            supabase functions deploy "$fn"
            echo "::endgroup::"
          done
